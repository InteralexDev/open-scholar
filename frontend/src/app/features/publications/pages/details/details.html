<main class="details-page">
  <header class="details-header">
    <button type="button">← Back</button>
    <h1>Publication details</h1>
  </header>

  <article class="publication-details">
    <h2>Publication title</h2>

    <section class="metadata-section">
      <h3>Authors</h3>
      <p>Author 1, Author 2</p>
    </section>

    <section class="metadata-grid">
      <div>
        <h3>Journal</h3>
        <p>Journal name</p>
      </div>

      <div>
        <h3>Publisher</h3>
        <p>Publisher name</p>
      </div>

      <div>
        <h3>Publication year</h3>
        <p>2026</p>
      </div>

      <div>
        <h3>Language</h3>
        <p>en</p>
      </div>
    </section>

    <section class="metadata-section">
      <h3>Keywords</h3>
      <p>keyword, keyword, keyword</p>
    </section>

    <section class="metadata-section">
      <h3>Topics</h3>
      <p>topic, topic, topic</p>
    </section>
  </article>

  <section class="export-actions">
    <button type="button">Export JSON</button>
    <button type="button">Export Dublin Core XML</button>
  </section>
</main>
