services:
  postgres:
    image: postgres:17-alpine
    container_name: open-scholar-postgres
    environment:
      POSTGRES_DB: openscholar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data: